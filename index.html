<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Family Ledger">
    <title>Odelade Family Ledger</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#FFFFFF',
                        'surface-soft': '#F0FDFA',
                        'surface-raised': '#CCFBF1',
                        brand: '#0D9488',
                        'brand-hover': '#0F766E',
                        'brand-light': '#CCFBF1',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8',
                        border: '#CCFBF1',
                        'border-strong': '#99F6E4',
                        'table-header': '#F0FDFA',
                        success: '#059669',
                        error: '#DC2626',
                        warning: '#D97706',
                        info: '#0891B2',
                        pool1: '#0F172A',
                        pool2: '#475569'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230D9488' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m2 9 10-5 10 5-10 5-10-5z'/><path d='m2 14 10 5 10-5'/><path d='m2 19 10 5 10-5'/></svg>">
    
    <style>
        html { overflow-x: hidden; scroll-behavior: smooth; }
        body { 
            overflow-x: hidden;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif; 
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #CCFBF1;
            border-top-color: #0D9488;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a, button { transition: all 0.15s ease; }
        .icon { display: inline-flex; width: 1em; height: 1em; }
        .icon-sm { width: 16px; height: 16px; }
        .icon-md { width: 20px; height: 20px; }
        .icon-lg { width: 24px; height: 24px; }
        .touch-target { min-height: 48px; min-width: 48px; }
        
        /* DEV ERROR OVERLAY - remove for production */
        #error-overlay { position: fixed; inset: 0; background: #0F172A; color: #fff; z-index: 99999; padding: 20px; overflow: auto; font-family: monospace; font-size: 13px; display: none; }
        /* END DEV ERROR OVERLAY */
    </style>
    <!-- ERROR CATCHER - remove before production -->
    <div id="error-overlay" style="display:none;position:fixed;inset:0;background:#0F172A;color:#fff;z-index:99999;padding:20px;overflow:auto;font-family:monospace;font-size:13px;">
        <div style="background:#DC2626;padding:12px 16px;border-radius:8px;margin-bottom:16px;">
            <strong>JS Error</strong>
        </div>
        <pre id="error-message" style="white-space:pre-wrap;line-height:1.6;color:#FCA5A5;"></pre>
        <pre id="error-stack" style="white-space:pre-wrap;line-height:1.6;color:#94A3B8;margin-top:12px;font-size:11px;"></pre>
    </div>
    <script>
        // Catch all JS errors and show on screen
        window.onerror = function(msg, src, line, col, err) {
            var overlay = document.getElementById('error-overlay');
            var msgEl = document.getElementById('error-message');
            var stackEl = document.getElementById('error-stack');
            overlay.style.display = 'block';
            msgEl.textContent = msg + '\n\nFile: ' + src + '\nLine: ' + line + ', Col: ' + col;
            stackEl.textContent = err && err.stack ? err.stack : 'No stack trace';
            return false;
        };
        // Catch unhandled promise rejections (async errors)
        window.onunhandledrejection = function(e) {
            var overlay = document.getElementById('error-overlay');
            var msgEl = document.getElementById('error-message');
            var stackEl = document.getElementById('error-stack');
            overlay.style.display = 'block';
            msgEl.textContent = 'Unhandled Promise: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
            stackEl.textContent = e.reason && e.reason.stack ? e.reason.stack : 'No stack trace';
        };
    </script>
    <!-- END ERROR CATCHER -->
</head>
<body class="bg-surface-soft text-text-primary min-h-screen">
    <div id="app"></div>
    <div id="toasts" class="fixed bottom-20 left-4 right-4 z-50 flex flex-col gap-2 sm:bottom-4 sm:left-auto sm:right-4 sm:w-96 pointer-events-none"></div>
    <div id="lang-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeLangModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 max-h-[70vh] overflow-y-auto rounded-t-3xl bg-surface p-4">
            <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
            <h3 class="mb-4 text-center font-semibold text-lg">Choose Language</h3>
            <div class="space-y-2" id="lang-options"></div>
        </div>
    </div>
    
    <script src="/js/i18n.js"></script>
    <script src="/js/store.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/mock.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/pages.js"></script>
    <script src="/js/router.js"></script>
    
    <script>
        // Single initialization point
        function initApp() {
            if (typeof store === 'undefined' || typeof router === 'undefined') {
                setTimeout(initApp, 50);
                return;
            }
            try {
                store.init();
                router.init();
                renderLangOptions();
            } catch(e) {
                console.error('Init error:', e);
                var overlay = document.getElementById('error-overlay');
                if (overlay) {
                    overlay.style.display = 'block';
                    document.getElementById('error-message').textContent = e.message;
                    document.getElementById('error-stack').textContent = e.stack || 'No stack';
                }
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
        
        // Render language options
        function renderLangOptions() {
            var container = document.getElementById('lang-options');
            if (!container) return;
            var langs = [
                { code: 'en', name: 'English', flag: '🇬🇧' },
                { code: 'yo', name: 'Yorùbá', flag: '🇳🇬' },
                { code: 'ig', name: 'Igbo', flag: '🇳🇬' },
                { code: 'ha', name: 'Hausa', flag: '🇳🇬' }
            ];
            container.innerHTML = langs.map(function(lang) {
                return '<button onclick="setLang(\'' + lang.code + '\')" class="flex w-full items-center justify-between rounded-xl px-4 py-4 text-left hover:bg-surface-soft">' +
                    '<span class="flex items-center gap-3"><span class="font-medium">' + lang.name + '</span></span>' +
                    '<span class="check hidden text-brand">✓</span></button>';
            }).join('');
        }
    </script>
</body>
</html>
